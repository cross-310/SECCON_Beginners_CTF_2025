name: "pet_name"      # TODO: 問題名を設定してください。
author: "hama"           # TODO: 自分の名前を設定してください。
category: "pwnable"          # TODO: カテゴリを設定してください。web/crypto/misc/pwnable/reversing/welcomeのどれかを追加してください。
description: "ペットに名前を付けましょう。ちなみにフラグは/home/pwn/flag.txtに書いてあるみたいです。"   # TODO: 説明文を入力してください。
# attempts: 5                     # TODO: 提出回数制限がある場合は記載して下さい。

flags:
    - "ctf4b{3xp1oit_pet_n4me!}"                   # TODO: Flagを追加してください

# Tags are used to provide additional public tagging to a challenge
# Accepts strings
tags:                   
     - author:hama             # TODO: authorを設定してください。author:を含めて下さい。
     - beginner      # TODO: 難易度を追加してください。beginner/easy/medium/hard のいずれかを追加してください。

# connection_info is used to provide a link, hostname, or instructions on how to connect to a challenge
connection_info: nc pet-name.challenges.beginners.seccon.jp 9080  # TODO: サーバを利用している場合は接続情報を追加してください。サーバを利用していない場合はコメントアウトしてください。

# Provide paths to files from the same directory that this file is in
# Accepts strings
files:
    - pet_name.zip

# Hints are used to give players a way to buy or have suggestions. They are not
# required but can be nice.
# Can be removed if unused
# Accepts dictionaries or strings
# hints:                              
#     - {
#         content: "問題文に書いてありますよね？",
#         cost: 10
#     }
#     - このヒントのようにcostがない場合はコスト不要なヒントとして表示されます

