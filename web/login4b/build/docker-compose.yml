services:
  app:
    build: .
    ports:
      - "3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=jC9^yE8HVin9ra!Y
      - DB_NAME=login4b
      - SESSION_SECRET=yW5@V8xRCk#DMxTg
      - FLAG=ctf4b{y0u_c4n_byp455_my5q1_imp1ici7_7yp3_c457}
      - ADMIN_PASSWORD=sA6&s8@ff*o%
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=jC9^yE8HVin9ra!Y
      - MYSQL_DATABASE=login4b
    ports:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
